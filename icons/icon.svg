<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3D2060"/>
      <stop offset="100%" style="stop-color:#7B5EA7"/>
    </linearGradient>
  </defs>
  <!-- Fond circulaire -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <!-- Croissant de lune -->
  <circle cx="256" cy="210" r="110" fill="#FAF0FF" opacity="0.95"/>
  <circle cx="298" cy="185" r="88" fill="#7B5EA7"/>
  <!-- Étoile -->
  <circle cx="320" cy="130" r="10" fill="#FAF0FF" opacity="0.9"/>
  <circle cx="348" cy="158" r="6" fill="#FAF0FF" opacity="0.7"/>
  <!-- Lettre S stylisée -->
  <text x="256" y="390" font-family="Georgia, serif" font-size="160" font-weight="700"
        fill="#FAF0FF" text-anchor="middle" opacity="0.95">S</text>
  <!-- Point sous le S -->
  <circle cx="256" cy="430" r="8" fill="#C9B8E8" opacity="0.7"/>
